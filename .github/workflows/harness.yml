name: Backend Harness

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-harness:
    name: 백엔드 하네스 검증
    runs-on: windows-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle 캐시 설정
        uses: gradle/actions/setup-gradle@v4

      - name: 하네스 제약 검사
        shell: pwsh
        run: ./scripts/harness-check.ps1

      - name: 백엔드 테스트
        shell: pwsh
        run: ./gradlew.bat test
