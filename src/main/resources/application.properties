spring.application.name=AMHS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
amhs.monitoring.sse-timeout-ms=1800000
amhs.monitoring.heartbeat-interval-ms=30000
amhs.monitoring.outbound-queue-size=500
amhs.simulation.tick-interval-ms=1000
amhs.simulation.max-active-transfers=20
amhs.simulation.move-event-buffer-size=1000
amhs.analytics.delay-threshold-seconds=120
